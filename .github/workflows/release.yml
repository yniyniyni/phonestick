# Builds a signed release APK and attaches it to the GitHub release.
# Requires repo secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS,
# KEY_PASSWORD (see README "Releases").

name: Release APK

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so `git describe --tags` produces versionName.
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          PHONESTICK_KEYSTORE: ${{ runner.temp }}/release.keystore
          PHONESTICK_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          PHONESTICK_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          PHONESTICK_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Attach APK to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk "phonestick-${GITHUB_REF_NAME}.apk"
          gh release upload "$GITHUB_REF_NAME" "phonestick-${GITHUB_REF_NAME}.apk"
